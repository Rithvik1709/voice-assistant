name: CI Performance Regression Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  performance:
    name: Concurrent Load Performance Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python 3.11
        uses: actions/setup-python@82c7e60c44026adc22a33c1672e4d96d9860b787 # v5.1.0
        with:
          python-run: '3.11'
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev

      - name: Install Package and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start gRPC Server in Mock Mode
        env:
          MOCK_MODELS: "1"
        run: |
          python -m voice_assistant.main --mode server --port 50051 &
          sleep 3

      - name: Run ASR 50-Client Concurrent Load Test
        run: |
          python scripts/bench/load_asr.py --concurrency 50 --frames-per-client 2 --out-file bench_results.json

      - name: Assert Performance Budget (Processing p95 < 300ms)
        run: |
          python -c "
          import json, sys
          try:
              with open('bench_results.json') as f:
                  res = json.load(f)
              p95_first = res['summary']['first_audio_ms']['p95']
              p95_last = res['summary']['last_audio_ms']['p95']
              throughput = res['summary']['throughput_responses_per_sec']
              
              # Subtract 200ms of active client streaming time (2 frames of 100ms each)
              net_p95_processing = max(0.0, p95_first - 200.0)
              
              print(f'=== PERFORMANCE METRICS ===')
              print(f'Throughput: {throughput:.2f} resp/sec')
              print(f'Raw p95 First Audio Latency: {p95_first:.2f}ms')
              print(f'Net p95 ASR/TTS Processing Latency: {net_p95_processing:.2f}ms (Budget: 300ms)')
              print(f'=============================')
              assert net_p95_processing < 300.0, f'Net p95 ASR/TTS processing latency is too high: {net_p95_processing}ms'
              print('SUCCESS: All performance metrics are within the performance budget!')
          except Exception as e:
              print(f'FAILURE: {e}', file=sys.stderr)
              sys.exit(1)
          "
